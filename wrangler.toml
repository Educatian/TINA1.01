# Cloudflare Pages config for TINA's web hosting (Supabase stays the backend).
# Static build is published from dist/; Pages auto-compiles functions/ into
# Functions (the AI proxy at /api/ai-proxy). Deploy: `npm run cf:deploy`.
name = "tina-adie"
compatibility_date = "2026-06-01"
pages_build_output_dir = "dist"

# Keyless chat fallback for the AI proxy when no Gemini key is set (a fresh
# deploy is never a broken chat). The Function prefers Gemini whenever its
# secret exists.
[ai]
binding = "AI"
